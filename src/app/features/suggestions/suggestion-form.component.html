<div class="form-container">
  <form [formGroup]="suggestionForm" (ngSubmit)="onSubmit()">
    <!-- TITRE -->
    <div class="form-group">
      <label for="title">Titre :</label>
      <input
        id="title"
        type="text"
        class="form-control"
        formControlName="title"
        placeholder="Titre de la suggestion"
      />

      <div
        class="error"
        *ngIf="
          suggestionForm.get('title')?.invalid &&
          (suggestionForm.get('title')?.touched ||
            suggestionForm.get('title')?.dirty)
        "
      >
        <span *ngIf="suggestionForm.get('title')?.errors?.['required']">
          Le titre est obligatoire.
        </span>

        <span *ngIf="suggestionForm.get('title')?.errors?.['minlength']">
          Le titre doit contenir au moins 5 caractères.
        </span>

        <span *ngIf="suggestionForm.get('title')?.errors?.['pattern']">
          Le titre doit commencer par une majuscule et contenir uniquement des
          lettres.
        </span>
      </div>
    </div>

    <!-- DESCRIPTION -->
    <div class="form-group">
      <label for="description">Description :</label>
      <textarea
        id="description"
        rows="4"
        class="form-control"
        formControlName="description"
        placeholder="Description détaillée de la suggestion"
      >
      </textarea>

      <div
        class="error"
        *ngIf="
          suggestionForm.get('description')?.invalid &&
          (suggestionForm.get('description')?.touched ||
            suggestionForm.get('description')?.dirty)
        "
      >
        <span *ngIf="suggestionForm.get('description')?.errors?.['required']">
          La description est obligatoire.
        </span>

        <span *ngIf="suggestionForm.get('description')?.errors?.['minlength']">
          La description doit contenir au moins 30 caractères.
        </span>
      </div>
    </div>

    <!-- CATEGORIE -->
    <div class="form-group">
      <label for="category">Catégorie :</label>

      <select id="category" class="form-control" formControlName="category">
        <option value="">-- Sélectionnez une catégorie --</option>

        <option *ngFor="let c of categories" [value]="c">
          {{ c }}
        </option>
      </select>

      <div
        class="error"
        *ngIf="
          suggestionForm.get('category')?.invalid &&
          (suggestionForm.get('category')?.touched ||
            suggestionForm.get('category')?.dirty)
        "
      >
        <span *ngIf="suggestionForm.get('category')?.errors?.['required']">
          La catégorie est obligatoire.
        </span>
      </div>
    </div>

    <!-- DATE (readonly) -->
    <div class="form-group">
      <label>Date :</label>
      <input
        type="text"
        class="form-control form-control--readonly"
        [value]="today | date : 'dd/MM/yyyy'"
        readonly
      />
    </div>

    <!-- STATUS (readonly) -->
    <div class="form-group">
      <label>Status :</label>
      <input
        type="text"
        class="form-control form-control--readonly"
        [value]="defaultStatus"
        readonly
      />
    </div>

    <!-- BOUTON -->
    <button
      type="submit"
      class="submit-btn"
      [disabled]="suggestionForm.invalid"
    >
      Soumettre
    </button>
  </form>
</div>
